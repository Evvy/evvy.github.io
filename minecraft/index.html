<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Markdown Site</title>
  <meta name="description" content="A clean GitHub Pages site for markdown content." />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #6b7280;
      --border: #e5e7eb;
      --code-bg: #f6f8fa;
      --max-width: 760px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.7;
    }

    .page {
      width: 100%;
      padding: 56px 20px 80px;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    header {
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .site-title {
      margin: 0;
      font-size: 2rem;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .site-subtitle {
      margin: 10px 0 0;
      color: var(--muted);
      font-size: 1rem;
    }

    .content {
      min-height: 50vh;
    }

    .content h1,
    .content h2,
    .content h3,
    .content h4 {
      line-height: 1.2;
      letter-spacing: -0.02em;
      margin-top: 2.2em;
      margin-bottom: 0.7em;
    }

    .content h1 {
      font-size: 2rem;
      margin-top: 0;
    }

    .content h2 {
      font-size: 1.5rem;
    }

    .content h3 {
      font-size: 1.2rem;
    }

    .content p,
    .content ul,
    .content ol,
    .content blockquote {
      margin: 1em 0;
    }

    .content ul,
    .content ol {
      padding-left: 1.25rem;
    }

    .content a {
      color: inherit;
      text-decoration-thickness: 1px;
      text-underline-offset: 0.15em;
    }

    .content img {
      max-width: 100%;
      height: auto;
      display: block;
      border-radius: 12px;
      margin: 1.5rem 0;
    }

    .content pre {
      background: var(--code-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1rem;
      overflow-x: auto;
      font-size: 0.95rem;
    }

    .content code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size: 0.92em;
    }

    .content :not(pre) > code {
      background: var(--code-bg);
      padding: 0.15em 0.4em;
      border-radius: 6px;
    }

    .content blockquote {
      border-left: 3px solid var(--border);
      padding-left: 1rem;
      color: var(--muted);
    }

    .content hr {
      border: 0;
      border-top: 1px solid var(--border);
      margin: 2rem 0;
    }

    .content table {
      width: 100%;
      border-collapse: collapse;
      margin: 1.5rem 0;
      font-size: 0.96rem;
    }

    .content th,
    .content td {
      text-align: left;
      padding: 0.75rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .status {
      color: var(--muted);
      font-size: 0.95rem;
    }

    footer {
      margin-top: 56px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.95rem;
    }

    @media (max-width: 640px) {
      .page {
        padding-top: 36px;
      }

      .site-title {
        font-size: 1.7rem;
      }

      .content h1 {
        font-size: 1.7rem;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="container">
      <header>
        <h1 class="site-title">My Markdown Site</h1>
        <p class="site-subtitle">A minimal GitHub Pages website that renders a markdown file.</p>
      </header>

      <article id="content" class="content">
        <p class="status">Loading markdown…</p>
      </article>

      <footer>
        Edit <code>content.md</code> to update this page.
      </footer>
    </div>
  </main>

  <script>
    marked.setOptions({
      gfm: true,
      breaks: false
    });

    async function loadMarkdown() {
      const content = document.getElementById('content');

      try {
        const response = await fetch('./content.md', { cache: 'no-store' });

        if (!response.ok) {
          throw new Error('Could not load content.md');
        }

        const markdown = await response.text();
        content.innerHTML = marked.parse(markdown);
      } catch (error) {
        content.innerHTML = `
          <h2>Setup needed</h2>
          <p>Create a file named <code>content.md</code> in the same folder as this <code>index.html</code>.</p>
          <p class="status">${error.message}</p>
        `;
      }
    }

    loadMarkdown();
  </script>
</body>
</html>
