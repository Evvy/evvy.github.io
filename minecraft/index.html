<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Markdown Site</title>
  <meta name="description" content="A clean GitHub Pages site for markdown content." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/github-markdown-css@5.8.1/github-markdown-light.min.css" />

  <script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote/dist/markdown-it-footnote.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/markdown-it-task-lists/dist/markdown-it-task-lists.min.js"></script>

  <style>
    :root {
      --page-bg: #f8fafc;
      --panel-bg: #ffffff;
      --border: #d0d7de;
      --text: #1f2328;
      --muted: #656d76;
      --shadow: 0 1px 2px rgba(16, 24, 40, 0.04), 0 8px 24px rgba(16, 24, 40, 0.06);
      --radius: 18px;
      --max-width: 920px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(to bottom, #f8fafc 0%, #f3f4f6 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .shell {
      width: 100%;
      padding: 40px 20px 72px;
    }

    .container {
      max-width: var(--max-width);
      margin: 0 auto;
    }

    .hero {
      margin-bottom: 22px;
      padding: 0 4px;
    }

    .site-title {
      margin: 0;
      font-size: clamp(2rem, 4vw, 2.8rem);
      line-height: 1.05;
      letter-spacing: -0.04em;
    }

    .site-subtitle {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
      line-height: 1.6;
    }

    .card {
      background: var(--panel-bg);
      border: 1px solid rgba(208, 215, 222, 0.9);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-header,
    .card-footer {
      padding: 18px 24px;
      color: var(--muted);
      font-size: 0.95rem;
      background: rgba(246, 248, 250, 0.7);
    }

    .card-header {
      border-bottom: 1px solid var(--border);
    }

    .card-footer {
      border-top: 1px solid var(--border);
    }

    .markdown-body {
      max-width: none;
      min-height: 55vh;
      padding: 32px 24px 40px;
      background: transparent;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .markdown-body h1,
    .markdown-body h2,
    .markdown-body h3,
    .markdown-body h4,
    .markdown-body h5,
    .markdown-body h6 {
      letter-spacing: -0.02em;
    }

    .markdown-body img {
      border-radius: 12px;
    }

    .markdown-body blockquote {
      color: #57606a;
    }

    .markdown-body .task-list-item {
      list-style: none;
    }

    .markdown-body .task-list-item input {
      margin: 0 0.5rem 0.2rem -1.4rem;
    }

    .markdown-alert {
      padding: 0.8rem 1rem;
      margin-bottom: 16px;
      border-left: 0.25em solid var(--border);
      border-radius: 8px;
    }

    .markdown-alert > :first-child {
      margin-top: 0;
    }

    .markdown-alert > :last-child {
      margin-bottom: 0;
    }

    .markdown-alert-title {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 0.45rem;
      font-weight: 600;
      line-height: 1;
    }

    .markdown-alert-note {
      border-left-color: #4493f8;
    }

    .markdown-alert-tip {
      border-left-color: #3fb950;
    }

    .markdown-alert-important {
      border-left-color: #ab7df8;
    }

    .markdown-alert-warning {
      border-left-color: #d29922;
    }

    .markdown-alert-caution {
      border-left-color: #f85149;
    }

    .status {
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .shell {
        padding: 24px 14px 40px;
      }

      .card-header,
      .card-footer,
      .markdown-body {
        padding-left: 16px;
        padding-right: 16px;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <div class="container">
      <section class="hero">
        <h1 class="site-title">My Markdown Site</h1>
        <p class="site-subtitle">A minimal GitHub Pages website with GitHub-style markdown rendering.</p>
      </section>

      <section class="card">
        <div class="card-header">Rendering <code>content.md</code></div>
        <article id="content" class="markdown-body">
          <p class="status">Loading markdown…</p>
        </article>
        <div class="card-footer">Edit <code>content.md</code> to update this page.</div>
      </section>
    </div>
  </main>

  <script>
    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function renderGitHubAlerts(html) {
      return html.replace(
        /<blockquote>\s*<p>\[!(NOTE|TIP|IMPORTANT|WARNING|CAUTION)\]([\s\S]*?)<\/p>([\s\S]*?)<\/blockquote>/gi,
        (_, type, firstLineRest, remainingContent) => {
          const label = type.charAt(0).toUpperCase() + type.slice(1).toLowerCase();
          const body = `${firstLineRest}${remainingContent}`.trim();
          return `
            <div class="markdown-alert markdown-alert-${type.toLowerCase()}">
              <p class="markdown-alert-title">${label}</p>
              ${body}
            </div>
          `;
        }
      );
    }

    const md = window.markdownit({
      html: true,
      linkify: true,
      typographer: true,
      breaks: false
    })
      .use(window.markdownitFootnote)
      .use(window.markdownitTaskLists, { enabled: true, label: true, labelAfter: true });

    async function loadMarkdown() {
      const content = document.getElementById('content');

      try {
        const response = await fetch('./content.md', { cache: 'no-store' });

        if (!response.ok) {
          throw new Error('Could not load content.md');
        }

        const markdown = await response.text();
        const rendered = md.render(markdown);
        content.innerHTML = renderGitHubAlerts(rendered);
      } catch (error) {
        content.innerHTML = `
          <h2>Setup needed</h2>
          <p>Create a file named <code>content.md</code> in the same folder as this <code>index.html</code>.</p>
          <pre><code>${escapeHtml(error.message)}</code></pre>
        `;
      }
    }

    loadMarkdown();
  </script>
</body>
</html>
